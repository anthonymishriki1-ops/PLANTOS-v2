// --- KB Cache & Knowledge Base Functions ---
let _KB_CACHE = null;
let _KB_CACHE_LOADING = false;
let _KB_CACHE_CALLBACKS = [];

function kbCacheGet() { return _KB_CACHE; }

function kbCacheLoad() {
    if (_KB_CACHE) return Promise.resolve(_KB_CACHE);
    if (DEMO_MODE)  return Promise.resolve(null);
    if (_KB_CACHE_LOADING) {
        return new Promise(res => _KB_CACHE_CALLBACKS.push(res));
    }
    _KB_CACHE_LOADING = true;
    return gasCall('kbDump').then(data => {
        _KB_CACHE = (data && data.ok) ? data : null;
        _KB_CACHE_LOADING = false;
        _KB_CACHE_CALLBACKS.forEach(cb => cb(_KB_CACHE));
        _KB_CACHE_CALLBACKS = [];
        return _KB_CACHE;
    }).catch(() => {
        _KB_CACHE_LOADING = false;
        _KB_CACHE_CALLBACKS.forEach(cb => cb(null));
        _KB_CACHE_CALLBACKS = [];
        return null;
    });
}

function kbPersonality(query, plant, chatHistory) {
    const raw = query.trim();
    const plantName = plant && plant.genus ? plant.genus : 'your plant';
    const hasPrior = chatHistory && chatHistory.length > 0;
    const q = raw.trim().toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
    if (!q) return null;
    function reply(t) { return { type: 'personality', text: t }; }

    const GREET = ['hi','hey','hello','hiya','howdy','sup','yo','heya'];
    if (GREET.indexOf(q) !== -1 || q.indexOf('good morning') === 0 || q.indexOf('good afternoon') === 0 || q.indexOf('good evening') === 0 || q.indexOf('whats up') === 0) {
        const msgs = ["Hey! What's going on with " + plantName + "?", "Hi! What are you seeing on " + plantName + "?", "Hello! What's up with " + plantName + "?"];
        return reply(msgs[raw.length % msgs.length]);
    }

    const RUDE = ['fuck','shit','cunt','bitch','asshole','dick','bastard','twat'];
    const PLANT_WORDS = ['rot','bug','fly','wilt','droop','smell','mold','spot','brown','yellow','dead','dying','pest','fungus','gnat','scale','aphid','mite','mealybug','thrip','root','leaf','stem','soil','water','plant','white','black','sticky','soft','mushy','dry','wet'];
    const hasRude = RUDE.some(function(w) { return q.indexOf(w) !== -1; });
    const hasPlant = PLANT_WORDS.some(function(w) { return q.indexOf(w) !== -1; });
    if (hasRude && !hasPlant && q.length < 30) {
        return reply("I get it — plant problems are frustrating. Tell me what's going on with " + plantName + " and I'll help.");
    }

    const THANKS = ['thanks','thank you','thx','cheers','great','helpful','brilliant','love it','ty'];
    if (hasPrior && THANKS.some(function(w) { return q === w || q.indexOf(w) === 0; })) {
        const msgs = ["Glad that helped! Keep an eye on " + plantName + ".", "You're welcome. Let me know if anything else comes up.", "Happy to help. Any other symptoms?"];
        return reply(msgs[raw.length % msgs.length]);
    }

    const THINKING = ['uhm','uh','um','hmm','hm','euh','erm','err','ah','oh'];
    if (THINKING.indexOf(q) !== -1) {
        const msgs = ["Take your time — what are you seeing on " + plantName + "?", "What's caught your eye? Describe it and I'll look it up.", "No rush — what does it look like?"];
        return reply(msgs[raw.length % msgs.length]);
    }

    const AFFIRM = ['okay','ok','yep','yeah','cool','sure','got it','makes sense','alright','right','yes','nope','nah','no','mm','mmm','k'];
    if (AFFIRM.indexOf(q) !== -1) {
        if (!hasPrior) return null;
        const msgs = ["Let me know if you have more questions about " + plantName + ".", "Good luck with it — come back if things change.", "Sounds good. Shout if you need anything else."];
        return reply(msgs[raw.length % msgs.length]);
    }

    const META = ['what are you','who are you','whats your name','are you an ai','are you a bot','are you human','what can you do'];
    if (META.some(function(w) { return q.indexOf(w) !== -1; })) {
        return reply("I'm Carl — your plant expert. Ask me anything about " + plantName + ".");
    }

    if (q.indexOf('will i die') !== -1 && q.indexOf('plant') === -1) {
        return reply("That's outside my expertise. I'm a plant doctor — let's focus on " + plantName + ".");
    }

    const VAGUE = ['dry','wet','moist','damp','bad','weird','wrong','off','odd','strange','different','unusual'];
    if (VAGUE.indexOf(q) !== -1) {
        return reply("Can you say more? Where on " + plantName + " is it " + q + ", and when did you notice?");
    }

    return null;
}

        const isSizeSensitive = ['flies','fly','bugs','insects'].includes(phrase);
        const searchIn = isSizeSensitive ? lowerNoSize : lower;
        const idx = searchIn.indexOf(phrase);
        if (idx === -1) continue;
        const wordsBeforePhrase = lower.slice(0, idx).split(/\s+/).length - 1;

    pestRows.filter(r => diagPreds.has(r.predicate)).forEach(row => {

        uniq.forEach(kw => {
            const kwClean = kw.replace(/_/g,' ');
            if (objLower === kwClean || objLower.includes(kwClean) || kwClean.includes(objLower)) {
                scores[row.subject]  = (scores[row.subject]||0) + 2;
                matched[row.subject] = matched[row.subject]||[];
                if (!matched[row.subject].includes(row.object)) matched[row.subject].push(row.object);

        });
    });

                 .forEach(r => {
                     const pestKey = r.object.toLowerCase().replace(/ /g,'_');
                     if (scores[pestKey]) scores[pestKey] += 2;
                 });
    }

    if (!Object.keys(scores).length) return {
        ok: true, results: [], keywords: uniq,
        message: cache.pests.length < 5
            ? 'Pest & Disease dataset appears empty. Paste KB_Pest_Disease_v2.txt into the Import Zone and run Import.'
            : "No KB entries matched those symptoms. Try describing more specifically — e.g. \"shells on stems\", \"tiny flies near soil\".",
    };

    const maxScore = Math.max(...Object.values(scores));
    const getAll = (rows, pred) => rows.filter(r => r.predicate === pred);

    const results = Object.entries(scores)
        .sort((a,b) => b[1]-a[1]).slice(0,5)
        .map(([subject, score]) => {
            const sRows = pestRows.filter(r => r.subject === subject);
            const conf  = Math.round((score/maxScore)*100);
            return {
                subject,
                confidence: conf,
                confLabel:  conf>=70?'high':conf>=40?'medium':'low',
                matchedOn:  matched[subject]||[],
                signs:      getAll(sRows,'telltale_sign').slice(0,3).map(r=>r.object),
                kryptonites:getAll(sRows,'weak_to').slice(0,3).map(r=>({treatment:r.object,qualifier:r.qualifier})),
                interval:   (sRows.find(r=>r.predicate==='treatment_interval')||{}).object||null,
                confused:   getAll(sRows,'confused_with').slice(0,2).map(r=>({with:r.object,note:r.qualifier})),
                prevented:  getAll(sRows,'prevented_by').slice(0,2).map(r=>r.object),
            };
        });

    return {
        ok: true, results, keywords: uniq,
        message: `Found ${results.length} possible match${results.length>1?'es':''}.`,
    };

function kbFollowUp(query, lastResult, plant, chatHistory) {
    const q = query.toLowerCase().trim();
    const cache = kbCacheGet();
    const pestRows = (cache && cache.pests) ? cache.pests : [];
    const f = v => (v||'').replace(/_/g,' ').trim();

    const plantGenus = plant && plant.genus ? plant.genus : null;
    const sp = plant && (plant.species || plant.taxon) ? (plant.species || plant.taxon) : null;
    const sub = plant && plant.substrate ? plant.substrate : null;
    const pot = plant && plant.potMaterial ? plant.potMaterial : null;
    const loc = plant && plant.location ? plant.location : null;

    function plantRef() {
        if (plantGenus && sp) return `your ${plantGenus} ${sp}`;
        if (plantGenus) return `your ${plantGenus}`;
        return 'your plant';
    }

    function rowsFor(subj) {
        const s = subj.toLowerCase().replace(/ /g,'_');
        return pestRows.filter(r => r.subject === s || r.subject === subj.toLowerCase());
    }

    const lastSubject = lastResult && lastResult.topDiagnosis ? lastResult.topDiagnosis : null;
    const lastSubjectKey = lastSubject ? lastSubject.toLowerCase().replace(/ /g,'_').split(' / ')[0] : null;
    const diagRows = lastSubjectKey ? rowsFor(lastSubjectKey) : [];

    function varyQ(arr) {
        let h = 0;
        for (let i = 0; i < q.length; i++) h = (h * 31 + q.charCodeAt(i)) & 0xffff;
        return arr[h % arr.length];
    }
    function varyS(arr) {
        const seed = (lastSubjectKey||'') + q;
        let h = 0;
        for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) & 0xffff;
        return arr[h % arr.length];
    }

    function classify(q) {
        if (/how.*(treat|fix|deal|handle|get rid|cure|stop|remove|kill)/i.test(q)) return 'treatment';
        if (/what.*(do|should|use|need|buy|get|apply)/i.test(q)) return 'treatment';
        if (/\b(treat|treatment|fix|cure|kill|remove|get rid|help it)\b/i.test(q)) return 'treatment';
        if (/prevent|avoid|stop.*happen|won.*happen|again/i.test(q)) return 'prevention';
        if (/come back|recur|return|happen again|get it again/i.test(q)) return 'prevention';
        if (/how long|how.*often|when|repeat|how many|frequency/i.test(q)) return 'timing';
        if (/why|cause|reason|how.*happen|come from|where.*from/i.test(q)) return 'cause';
        if (/spread|contagious|other plant|nearby|infect/i.test(q)) return 'spread';
        if (/serious|dangerous|worry|concern|bad|urgent/i.test(q)) return 'severity';
        if (/\b(kill|die|dead|dying|save|survive|recover|doomed|live|make it|pull through|lost)\b/i.test(q)) {
            if (/\bwill (i|you|we)\b/i.test(q) && !/\b(my plant|the plant|it)\b/i.test(q)) return 'general';
            return 'severity';
        }
        if (/soil|substrate|repot|medium|mix|pot/i.test(q)) return 'substrate';
        if (/water|watering|wet|dry|moisture|irrigat/i.test(q)) return 'watering';
        if (/light|sun|shade|bright|dark|window/i.test(q)) return 'light';
        if (/confirm|sure|definitely|certain|tell if|how.*know/i.test(q)) return 'confirm';
        if (/yes|no|yep|yeah|nope|correct|right|exactly|ok|okay/i.test(q)) return 'acknowledge';
        if (/thanks|thank you|got it|makes sense|helpful|cheers/i.test(q)) return 'thanks';
        return 'general';
    }

    function plantContextNote() {
        if (!sub || !lastSubjectKey) return null;
        if (lastSubjectKey.includes('root_rot') || lastSubjectKey.includes('root rot')) {
            if (/soil|peat|coir|organic/i.test(sub))
                return varyQ([
                    `${plantRef()} being in ${sub} is relevant here — it holds moisture and that's a contributing factor`,
                    `worth flagging that ${sub} retains water, which is exactly what encourages this`,
                    `the ${sub} isn't helping — it holds moisture longer than a fast-draining mix would`,
                ]);

function toKbAction(treatment, qualifier) {
    const t = ((treatment||'').replace(/_/g,' ')).trim();
    const tLow = t.toLowerCase();  // for case-insensitive key matching
    const q = qualifier ? (qualifier.replace(/_/g,' ')).trim() : '';
    const PHRASED = {
        'unpot inspect trim':       `Pull it out of the pot and check the roots — trim anything brown, black, or mushy, then repot into fresh dry mix`,
        'adjust watering':          `Let it dry out more between waterings going forward`,
        'hydrogen peroxide drench': `Drench the roots with a 1:4 hydrogen peroxide / water mix — kills the pathogen and re-oxygenates the root zone`,
        'soil drydown':             `Let the top 2 inches of soil dry out completely before watering again — this breaks the larval cycle`,
        'bti':                      `Apply Bti (Bacillus thuringiensis israelensis) to the soil — biological larvicide, completely safe for the plant`,
        'yellow sticky traps':      `Put yellow sticky traps near the soil to catch the adult flies`,
        'isopropyl alcohol':        `Dab 70% isopropyl alcohol directly onto visible insects with a cotton swab — direct contact kill`,
        'neem oil':                 `Apply diluted neem oil to all affected areas — disrupts the lifecycle and smothers crawlers`,
        'insecticidal soap':        `Spray with insecticidal soap, coating the undersides of leaves where pests hide`,
        'remove infected tissue':   `Cut off and bag any visibly infected leaves or stems — don't compost them`,
        'baking soda spray':        `Mix 1 tsp baking soda per litre of water and spray the affected areas`,
        'potassium bicarbonate':    `Potassium bicarbonate spray — more effective than baking soda if you can source it`,
        'bti':                      `Apply Bti (Bacillus thuringiensis israelensis) to the soil — a biological larvicide that kills larvae without harming the plant`,
        'spinosad':                 `Spinosad spray is highly effective — apply to both leaf surfaces`,
        'quarantine':               `Isolate this plant immediately to stop it spreading to others`,
        'humidifier':               `Run a humidifier nearby — most tropical houseplants want 50–70% relative humidity`,
        'grouping plants':          `Group plants together — they raise local humidity through transpiration`,
        'pebble tray':              `Place the pot on a tray of wet pebbles — evaporation lifts humidity around the leaves`,
        'misting':                  `Mist the leaves in the morning so they dry before evening — avoids fungal issues`,
        'manual removal':           `Physically remove what you can see — use a soft cloth or cotton swab dipped in water`,
        'improved drainage':        `Improve drainage — add perlite or switch to a chunkier substrate mix`,
        'diatomaceous earth':       `Dust diatomaceous earth on the soil surface — it's a physical barrier that damages soft-bodied insects`,
        'horticultural oil':        `Apply horticultural oil to all affected surfaces — it smothers eggs and soft stages`,
    };
    for (const [key, phrase] of Object.entries(PHRASED)) {
        if (tLow.includes(key)) {
            if (q) {
                const digits = q.match(/\d+/g) || [];
                const phraseHasDigits = digits.every(d => phrase.includes(d));
                if (!phraseHasDigits) return phrase + ` (${q})`;
            }
            return phrase;
        }
    }
    const cleaned = t.replace(/_/g, ' ');
    const numericQ = q && /\d/.test(q) && q.length < 30 ? ` — ${q}` : '';
    return cleaned.charAt(0).toUpperCase() + cleaned.slice(1) + numericQ;
}

function kbCompose(results, genus, query, plant) {

    const q = (query || '').toLowerCase();
    const f = v => (v||'').replace(/_/g,' ').trim();

    function vary(subject, arr) {
        let h = 0;
        for (let i = 0; i < subject.length; i++) h = (h * 31 + subject.charCodeAt(i)) & 0xffff;
        return arr[h % arr.length];
    }
    function varyQ(arr) {
        let h = 0;
        for (let i = 0; i < q.length; i++) h = (h * 31 + q.charCodeAt(i)) & 0xffff;
        return arr[h % arr.length];
    }

    function rowsFor(subj) {
        const s = subj.toLowerCase().replace(/ /g,'_');
        return pestRows.filter(r => r.subject === s || r.subject === subj.toLowerCase());
    }
    function resolveCauses(subject) {
        const sRows = rowsFor(subject);
        const causedBy = sRows.filter(r => r.predicate === 'symptom_of').map(r => r.object);

    function buildPicture(subject) {
        const sRows = rowsFor(subject);

            subject,
            signs:      sRows.filter(r=>r.predicate==='telltale_sign').map(r=>r.object),
            treatments: sRows.filter(r=>r.predicate==='weak_to').map(r=>({t:r.object,q:r.qualifier})),
            prevention: sRows.filter(r=>r.predicate==='prevented_by').map(r=>r.object),
            interval:   (sRows.find(r=>r.predicate==='treatment_interval')||{}).object||null,
            confused:   sRows.filter(r=>r.predicate==='confused_with').map(r=>({with:r.object,note:r.qualifier})),
            risk:       sRows.filter(r=>r.predicate==='risk_factor').map(r=>r.object),

    const top = results[0];

    let primary = causes[0];

    const resolvedTop = causes[0];
    const hasUnderwatering = results.some(r => {
        const rc = resolveCauses(r.subject);

    const hasRootRot = resolvedTop === 'root_rot' || resolvedTop.includes('root rot');

    const sub = plant && plant.substrate ? plant.substrate : null;
    const potM = plant && plant.potMaterial ? plant.potMaterial : null;
    const subjectName = f(primary);
    const sn = subjectName;  // short alias used in vary() calls throughout
    const genusStr = genus ? ` on ${genus}` : '';
    const plantStr = genus ? `your ${genus}` : 'your plant';

    function plantCtxHint() {
        if (!sub) return null;

                return vary(primary, [
                    `One thing worth flagging: ${plantStr} is in ${sub}, which holds onto moisture — that's a common setup for this.`,

                    `${sub} is moisture-retentive, so it's likely a contributing factor here.`,

            if (/mineral|pumice|perlite|leca/i.test(sub))
                return `${plantStr} is in ${sub}, which drains well — that's actually unusual for root rot. Worth looking harder at overwatering frequency rather than the mix itself.`;
        }
        if ((sk.includes('fungus_gnat') || sk.includes('fungus gnats')) && /peat|coir|organic|soil mix/i.test(sub))
            return vary(primary, [
                `${sub} is basically perfect for them — warm, moist, organic. It's their dream substrate.`,
                `${sub} is exactly what fungus gnats want to breed in. That's not a coincidence.`,
                `Heads up: ${sub} is prime gnat territory. This will keep happening unless the substrate or watering habits change.`,
            ]);
        if ((sk.includes('root_rot') || sk.includes('root rot')) && potM && /plastic/i.test(potM))
            return `Plastic pots hold moisture longer than terracotta — if this keeps coming back, that's worth changing.`;
        return null;
    }

    let explanation = '';

    if (isAmbiguous) {
        const causeNames = causes.slice(0,2).map(f);
        const isSymptomChain = top.subject !== primary && top.subject.replace(/_/g,' ') !== subjectName;
        if (isSymptomChain) {
            const symptomName = f(top.subject);
            const chainOpeners = [
                `That **${symptomName}** isn't the actual problem — it's a symptom of something else going on underneath.`,
                `**${symptomName}** is usually a side effect, not the cause${genusStr}.`,
                `The **${symptomName}** you're seeing is secondary — something else is driving it.`,
            ];
            explanation = vary(primary, chainOpeners);
            explanation += ` Most likely **${causeNames[0]}**${causeNames[1] ? ` or **${causeNames[1]}**` : ''}. Deal with the source and the ${symptomName} will clear up on its own.`;
        } else {
            const ambigOpeners = [
                `That could point to a couple of different things${genusStr} — hard to say for sure without more info.`,
                `This one's genuinely ambiguous${genusStr}. Two things fit this symptom equally well.`,
                `Not going to pretend I'm certain here — that symptom has two common explanations${genusStr}.`,
                `Could be one of two things${genusStr}, and they need different responses, so it's worth figuring out which.`,
            ];
            explanation = vary(primary, ambigOpeners) + ` The most likely culprits are **${causeNames[0]}** and **${causeNames[1]}**.`;
            if (causeNames.includes('root rot') && causeNames.includes('underwatering')) {
                explanation += vary(primary + 'diff', [
                    ` The test is simple: pull the pot and look at the soil. Wet and heavy = root rot. Bone dry = underwatering. The roots tell the full story — white and firm means healthy, brown and mushy means rot.`,
                    ` To tell them apart — feel the soil at the roots. Soggy and compacted points to rot. Completely dry points to underwatering. Check the roots themselves too: white = fine, brown/soft = rot.`,
                    ` Quick way to tell: unpot it and check. Wet, compacted soil with brown mushy roots = rot. Dry soil with limp but otherwise okay roots = underwatering.`,
                ]);
            } else {
                explanation += ` Check the root zone and overall soil moisture — that'll usually clarify which one you're dealing with.`;
            }
        }
    } else {
        let hook = '';

        if (q.includes('smell') || q.includes('poo') || q.includes('poop') || q.includes('stink') || q.includes('odour') || q.includes('odor')) {
            hook = vary(sn, [
                `That smell is a real red flag —`,
                `Yeah, a smell like that almost always means`,
                `The fact that it smells is the giveaway —`,
                `A bad smell from a plant is never nothing — this is almost certainly`,
                `That odour is diagnostic. Points straight to`,
            ]);
        } else if (q.includes('flies') || q.includes('gnat') || q.includes('fly') || q.includes('buzzing')) {
            hook = vary(sn, [
                `Those flies hovering around the soil are almost certainly`,
                `If they're small and hanging around the soil,`,
                `Little flies near the pot are a classic sign of`,
                `Those tiny fliers are basically a calling card for`,
                `Flies near or in the soil —`,
            ]);
        } else if (q.includes('jump') || q.includes('bouncing') || q.includes('springtail')) {
            hook = vary(sn, [
                `If they're jumping when you disturb the soil, that's`,
                `Jumping insects in soil are almost always`,
                `The jumping is the key detail — that's`,
            ]);
        } else if (q.includes('wilt') || q.includes('limp') || q.includes('droop') || q.includes('floppy') || q.includes('collapse')) {
            hook = vary(sn, [
                `Drooping like that usually comes down to`,
                `That kind of sudden limpness is typically`,
                `A plant wilting like that — even in what looks like okay soil — usually points to`,
                `When a plant collapses like that, nine times out of ten it's`,
                `That limpness is the body language of`,
            ]);
        } else if (q.includes('dead') || q.includes('dying') || q.includes('died')) {
            hook = vary(sn, [
                `If it's looking really rough — collapse, discoloration, the works — this could well be`,
                `When a plant looks like it's given up, the most common culprit is`,
                `That level of decline is often`,
            ]);
        } else if (q.includes('white') && (q.includes('powder') || q.includes('coat') || q.includes('dust') || q.includes('fuzz') || q.includes('fluff') || q.includes('fluffy'))) {
            hook = vary(sn, [
                `That white powdery coating is a textbook sign of`,
                `White fluffy or powdery growth on the leaves — that's`,
                `That white stuff is almost always`,
            ]);
        } else if (q.includes('shell') || q.includes('bump') || q.includes('lump') || q.includes('crust') || q.includes('armour') || q.includes('armor')) {
            hook = vary(sn, [
                `Little shell-like bumps on the stems? That's`,
                `Those crusty or waxy bumps are classic`,
                `What you're describing — hard little lumps on the plant — that's almost certainly`,
            ]);
        } else if (q.includes('web') || q.includes('silk') || q.includes('thread')) {
            hook = vary(sn, [
                `Webbing on a plant is almost always`,
                `Fine webbing between leaves or under them — that's`,
                `If you're seeing silk-like threads on the plant, that's`,
            ]);
        } else if (q.includes('sticky') || q.includes('honeydew') || q.includes('shiny')) {
            hook = vary(sn, [
                `Sticky residue on leaves is usually honeydew — a waste product from sap-sucking insects. Points to`,
                `That sticky coating is a sign of insect activity —`,
                `Sticky leaves usually mean something's feeding on the plant. Most likely`,
            ]);
        } else if (q.includes('yellow') || q.includes('yellowing') || q.includes('pale')) {
            hook = vary(sn, [
                `Yellowing like that is often a sign of`,
                `Pale or yellow leaves usually point to`,
                `That discolouration — going pale or yellow — is a classic symptom of`,
            ]);
        } else if (q.includes('brown') || q.includes('crispy') || q.includes('crunchy') || q.includes('tip')) {
            hook = vary(sn, [
                `Brown, crispy edges are a classic sign of`,
                `That browning is usually caused by`,
                `Crispy tips or brown edges — that points to`,
            ]);
        } else {
            hook = vary(sn, [
                `That sounds like`,
                `Most likely`,
                `What you're describing points to`,
                `Based on that,`,
                `Sounds like`,
                `I'd put money on`,
                `That's a classic presentation of`,
                `Going by what you described —`,
            ]);
        }

        explanation = `${hook} **${subjectName}**${genusStr}.`;

        if (pic.signs.length) {
            const uniqueSigns = [...new Set(pic.signs.map(s => s.toLowerCase()))].slice(0,2).map(f);
            if (uniqueSigns.length) {
                const signPhrases = [
                    ` To confirm, the telltale signs are ${uniqueSigns.join(' and ')}.`,
                    ` Classic signs are ${uniqueSigns.join(' and ')}.`,
                    ` You'd expect to see ${uniqueSigns[0]}${uniqueSigns[1] ? ` and ${uniqueSigns[1]}` : ''} alongside that.`,
                    ` Look for ${uniqueSigns.join(' and ')} to be sure.`,
                    ` The giveaway signs are ${uniqueSigns.join(' and ')}.`,
                ];
                explanation += vary(sn + 'signs', signPhrases);
            }
        }

        if (pic.thrives.length) {
            const cond = f(pic.thrives[0]);
            explanation += vary(sn + 'cond', [
                ` Tends to develop in ${cond} conditions.`,
                ` This usually shows up when conditions are ${cond}.`,
                ` ${cond.charAt(0).toUpperCase() + cond.slice(1)} is the environment it loves.`,
                ` Thrives when things are ${cond}.`,
            ]);
        } else if (pic.risk.length) {
            const risks = pic.risk.slice(0,2).map(f);
            explanation += vary(sn + 'risk', [
                ` Common triggers: ${risks.join(' and ')}.`,
                ` Usually comes down to ${risks.join(' or ')}.`,
                ` The usual culprits are ${risks.join(' and ')}.`,
            ]);
        }

        if (pic.confused.length) {
            const cx = pic.confused[0];
            const CONFUSION_MAP = {
                'wilt_with_dry_medium': 'underwatering (wilting but dry soil)',
                'wilt with dry medium': 'underwatering (wilting but dry soil)',
                'dry_substrate_wilt':   'underwatering',
                'overwatering':         'overwatering',
                'nutrient_deficiency':  'nutrient deficiency',
            };
            const confWith = CONFUSION_MAP[cx.with] || f(cx.with);
            const confNote = cx.note ? (CONFUSION_MAP[cx.note] || f(cx.note)) : null;
            explanation += vary(sn + 'conf', [
                ` Worth knowing it's sometimes mistaken for ${confWith}${confNote ? ` — ${confNote}` : ''}.`,
                ` Can look a bit like ${confWith}, so double-check${confNote ? ` — ${confNote}` : ''}.`,
                ` It does get confused with ${confWith} occasionally${confNote ? ` (${confNote})` : ''}.`,
            ]);
        }

        const ctxHint = plantCtxHint();
        if (ctxHint) explanation += ` ${ctxHint}`;
    }

    const actions = [];
    if (isAmbiguous) {
        causes.slice(0,2).forEach(cause => {
            const cp = buildPicture(cause);
            if (cp.treatments.length) {
                actions.push(`If it's ${f(cause)}: ${toKbAction(cp.treatments[0].t, cp.treatments[0].q)}`);
            }
        });
    } else {
        const seenActions = new Set();
        pic.treatments.slice(0,4).forEach(({t, q: tq}) => {
            const action = toKbAction(t, tq);
            const key = action.slice(0, 35).toLowerCase();
            if (!seenActions.has(key)) {
                seenActions.add(key);
                actions.push(action);
                if (actions.length >= 3) return;
            }
        });
        if (pic.prevention.length) {
            const prev = [...new Set(pic.prevention.slice(0,2).map(f))].join(' and ');
            actions.push(`To prevent recurrence: ${prev}`);
        }
    }

    let watchFor = '';
    if (isAmbiguous) {
        watchFor = `Check the soil moisture and root zone first — that'll tell you which direction to go.`;
    } else if (pic.interval) {
        const intervalStr = f(pic.interval);
        watchFor = vary(sn + 'watch', [
            `Keep treating ${intervalStr} until you see two consecutive clears.`,
            `Repeat ${intervalStr} — don't stop early, the lifecycle outlasts what you can see.`,
            `Treat ${intervalStr} until there's no new activity for at least two checks.`,
        ]);
    } else if (results.length > 1) {
        const alt = f(resolveCauses(results[1].subject)[0]);
        if (alt !== subjectName) watchFor = `If things don't improve in a week, also look into ${alt}.`;
    }

    const secondaryCauses = results.slice(1,4)
        .map(r => f(resolveCauses(r.subject)[0]))
        .filter(c => c !== subjectName && c !== f(top.subject))
        .filter((c, i, arr) => arr.indexOf(c) === i)
        .slice(0,2);
    const secondaryNote = secondaryCauses.length
        ? `Other possibilities worth ruling out: ${secondaryCauses.join(', ')}.`
        : '';

    const displayConf = isAmbiguous
        ? (top.confLabel === 'high' ? 'medium' : top.confLabel)
        : top.confLabel;

    return {
        topDiagnosis:     isAmbiguous ? causes.slice(0,2).map(f).join(' / ') : subjectName,
        confidence:       displayConf,
        explanation:      explanation.trim(),
        immediateActions: actions,
        watchFor,
        secondaryNote,
        kbResults:        results,
        source:           'kb',
    };
}

// --- Carl Learned/Conversation Cache & Offline Engine ---
var _carlLearnedCache = null;
var _carlLearnedExpiry = 0;

// Conversation pattern cache — loaded on CarlNPCPanel mount, searched synchronously offline
var _carlConvCache = null;
var _carlConvExpiry = 0;
var _carlConvLoading = false;

function carlConvCacheLoad_() {
    if (!window.HAS_GAS) return;
    var now = Date.now();
    if (_carlConvCache && now < _carlConvExpiry) return; // fresh
    if (_carlConvLoading) return;
    _carlConvLoading = true;
    gasCall('carlGetConversationPatterns').then(function(res) {
        if (res && Array.isArray(res.patterns)) {
            _carlConvCache = res.patterns;
            _carlConvExpiry = Date.now() + 5 * 60 * 1000; // 5 min TTL
        }
        _carlConvLoading = false;
    }).catch(function() { _carlConvLoading = false; });
}

function carlConvSearch_(q, genus, topic, exchangeType) {
    if (!_carlConvCache || !_carlConvCache.length) return null;
    var g     = String(genus||'').toLowerCase().trim();
    var t     = String(topic||'').trim();
    var type  = String(exchangeType||'').trim();
    var qWords = q.split(' ').filter(function(w){ return w.length > 2; });
    var best = null, bestScore = 0;
    _carlConvCache.forEach(function(row) {
        var rowGenus = String(row.genus||'').toLowerCase().trim();
        var rowTopic = String(row.topic||'').trim();
        var rowType  = String(row.type||'').trim();
        var rowTrig  = String(row.trigger||'').toLowerCase().trim();
        var rowResp  = String(row.response||'').trim();
        if (!rowResp) return;
        if (rowGenus && rowGenus !== '*' && g && rowGenus !== g) return;
        var score = 0;
        if (type && rowType === type) score += 3;
        if (t && rowTopic === t) score += 2;
        var trigWords = rowTrig.split(' ').filter(function(w){ return w.length > 2; });
        trigWords.forEach(function(tw) {
            if (q.indexOf(tw) !== -1) score += 2;
            else qWords.forEach(function(qw){ if (qw === tw || (qw.length > 3 && tw.indexOf(qw) !== -1)) score += 1; });
        });
        if (q.indexOf(rowTrig) !== -1 || rowTrig.indexOf(q) !== -1) score += 4;
        if (score > bestScore && score >= 4) {
            bestScore = score;
            best = { text: rowResp, actions: row.actions || [], watch: row.watch || '', source: 'learned-conv', _topic: rowTopic || t };
        }
    });
    return best;
}

async function carlSearchLearned(genus, query) {
    if (!window.HAS_GAS) return null;
    try {
        var result = await gasCall('plantosCarlSearch', genus || '*', query);
        return (result && result.answer) ? result : null;
    } catch(e) {
        return null;
    }
}

//  Layers: personality → context follow-up → KB (scored) →
//          plant facts → topic templates → clarification
// ═══════════════════════════════════════════════════════════════

// Normalise query text
function offNorm_(s) {
    return String(s||'').toLowerCase().replace(/[^a-z0-9 '?]/g,' ').replace(/\s+/g,' ').trim();
}

// Score a query against a keyword list (partial + exact, weighted)
function offScore_(q, keys) {
    var score = 0;
    var words = q.split(' ').filter(function(w){ return w.length > 1; });
    keys.forEach(function(k) {
        if (q === k) { score += 4; return; }
        if (q.indexOf(k) !== -1) { score += (k.indexOf(' ') !== -1 ? 3 : 2); return; }
        // partial word match
        k.split(' ').forEach(function(kw) {
            if (kw.length > 2 && words.some(function(w){ return w === kw || (w.length > 3 && kw.indexOf(w) !== -1); })) score += 1;
        });
    });
    return score;
}

// Extract active topic + last Carl response from chat history
function offGetContext_(history) {
    var ctx = { topic: null, lastCarlText: '', lastCarlActions: [], lastCarlWatch: '', lastUserText: '', turns: 0 };
    var clean = (history||[]).filter(function(m){ return !m.loading && m.text; });
    ctx.turns = clean.length;
    for (var i = clean.length - 1; i >= 0; i--) {
        var m = clean[i];
        if (m.role === 'carl' && !ctx.lastCarlText) {
            ctx.lastCarlText = m.text || '';
            ctx.lastCarlActions = m.actions || [];
            ctx.lastCarlWatch = m.watch || '';
            ctx.topic = m._topic || null;
        }
        if (m.role === 'user' && !ctx.lastUserText && i < clean.length - 1) {
            ctx.lastUserText = m.text || '';
        }
    }
    return ctx;
}

// Detect if a message is a conversational follow-up with no new topic signal
function offIsFollowUp_(q, ctx) {
    if (!ctx.lastCarlText || ctx.turns < 2) return false;
    var FOLLOWUP = [
        'what do you mean','how do i fix','how to fix','how do i do that','how do i','tell me more',
        'what does that look like','what should i do','what next','what now','and then','then what',
        'ok so','okay so','so i should','should i','do i need to','do i need','is that bad',
        'how bad','how serious','is it serious','what happens if','what if i dont','will it die',
        'how long','how often','how much','what kind','which one','which type',
        'more info','more detail','explain','elaborate','go on','continue',
        'what about','and what','and if','but what','but if',
        'yeah','yep','yes','ok','okay','got it','i see','right','sure','understood','thanks','thx','ty'
    ];
    return FOLLOWUP.some(function(f){ return q === f || q.indexOf(f) === 0 || q.indexOf(f) !== -1 && q.length < 40; });
}

// Generate a follow-up response staying on the active topic
function offFollowUpResponse_(q, ctx, plant, plantName) {
    var t = ctx.topic;
    var q2 = offNorm_(q);

    // Acknowledgement / thanks → wrap up topic
    var ACK = ['thanks','thank you','thx','ty','ok','okay','got it','i see','right','sure','understood','great','good','cool','nice','perfect','makes sense'];
    if (ACK.some(function(a){ return q2 === a || q2.indexOf(a) === 0; })) {
        var wrapUps = [
            'Glad that helps! Keep an eye on ' + plantName + ' and let me know if anything changes.',
            'Sure thing. Watch for those warning signs and you should be fine.',
            'No problem. Feel free to ask if anything else comes up with ' + plantName + '.',
        ];
        return { text: wrapUps[q2.length % wrapUps.length], actions: [], watch: '', source: 'personality', _topic: t };
    }

    // "how do I fix it / what should I do" → give the actions from last response
    var ACTION_Q = ['how do i fix','how to fix','what should i do','what do i do','how do i do that','what next','what now','fix it','fix this'];
    if (ACTION_Q.some(function(a){ return q2.indexOf(a) !== -1; })) {
        if (ctx.lastCarlActions && ctx.lastCarlActions.length) {
            return {
                text: "Here's what to do for " + plantName + ':',
                actions: ctx.lastCarlActions,
                watch: ctx.lastCarlWatch,
                source: 'follow-up', _topic: t
            };
        }
    }

    // "how serious / is it bad / will it die"
    var SERIOUS_Q = ['is it bad','how bad','how serious','is it serious','will it die','is it dying','should i be worried','that bad'];
    if (SERIOUS_Q.some(function(a){ return q2.indexOf(a) !== -1; })) {
        var sevMap = {
            'root-rot':    "Root rot can be fatal if ignored, but caught early it's very treatable. Act fast: unpot, cut the mushy roots, repot in fresh dry mix.",
            'overwater':   "Overwatering is one of the most common ways houseplants die, but " + plantName + " can recover if you act now. Stop watering and let the soil dry completely.",
            'underwater':  "Underwatering is stressful but rarely fatal this quickly. Water thoroughly right now and " + plantName + " should bounce back within a few hours.",
            'pests':       "Pests spread fast. The longer you wait, the harder they are to eliminate — and they can jump to nearby plants. Isolate " + plantName + " today.",
            'yellowing':   "Yellow leaves don't come back, but the plant can absolutely recover and push new healthy growth once you fix the root cause.",
            'default':     "It depends how far along it is. The steps I gave you are the right ones — act on them soon and " + plantName + " should be fine."
        };
        return { text: sevMap[t] || sevMap['default'], actions: [], watch: '', source: 'follow-up', _topic: t };
    }

    // "tell me more / more info / elaborate"
    var MORE_Q = ['tell me more','more info','more detail','explain','elaborate','go on','continue','more about'];
    if (MORE_Q.some(function(a){ return q2.indexOf(a) !== -1; })) {
        var moreMap = {
            'root-rot':   "Root rot is a fungal condition caused by Phytophthora or Pythium species that thrive in waterlogged soil. The roots can't take up oxygen or nutrients, so leaves droop/yellow even though the soil is wet. The fix: remove all black/mushy roots, dust cuts with cinnamon (natural antifungal), repot in fast-draining mix, and water only when the top 2\" is dry.",
            'overwater':  "Overwatering is about frequency vs drainage, not just volume. The real issue is soil staying wet too long — roots need oxygen. Fix: let it fully dry out, consider adding perlite to the mix for better drainage, and use a pot with drainage holes.",
            'pests':      "For most soft-bodied pests (mites, aphids, mealybugs) — 70% isopropyl alcohol on a cotton pad works brilliantly. Neem oil spray (diluted) prevents re-infestation. For fungus gnats, let the top inch of soil dry completely between waterings — their larvae need moist soil to survive.",
            'yellowing':  "If the yellow leaves are old/lower leaves, that's just natural senescence — normal. If it's new growth yellowing, that's a nutrient problem (usually nitrogen). If ALL leaves are yellowing simultaneously, that's usually root rot or severe overwatering.",
            'spots':      "Spot patterns are diagnostic: **concentric rings** = fungal. **Water-soaked then brown** = bacterial (usually from splashing water on leaves). **Bleached papery** = sun scorch. **Tiny stippled dots** = spider mites. Each has a different fix.",
            'default':    ctx.lastCarlText ? "To expand on what I said: " + ctx.lastCarlText : "What specifically would you like to know more about?"
        };
        return { text: moreMap[t] || moreMap['default'], actions: ctx.lastCarlActions || [], watch: ctx.lastCarlWatch || '', source: 'follow-up', _topic: t };
    }

    // "how long does it take"
    var TIME_Q = ['how long','how many days','how many weeks','when will','when should','take to','take for'];
    if (TIME_Q.some(function(a){ return q2.indexOf(a) !== -1; })) {
        var timeMap = {
            'root-rot':   "After repotting, give it 1-2 weeks to stabilise. New growth is a sign of recovery — you might see it in 3-6 weeks.",
            'pests':      "One treatment usually isn't enough. Repeat every 5-7 days for 3 weeks to break the egg cycle.",
            'underwater':  "If it's just underwatering, " + plantName + " should perk up within 1-4 hours of a thorough watering.",
            'repotting':  "Wait 4-6 weeks before fertilizing after repotting. New growth should appear within 4-8 weeks.",
            'propagation': "Most cuttings root in 2-6 weeks in water or moist perlite. Pot up when roots are 1-2 inches long.",
            'default':    "It depends on the severity, but most plants respond to correct care within 1-3 weeks. New growth is your signal that things are improving."
        };
        return { text: timeMap[t] || timeMap['default'], actions: [], watch: '', source: 'follow-up', _topic: t };
    }

    // Generic follow-up — stay on topic, use last response as anchor
    if (ctx.lastCarlText && ctx.lastCarlText.length > 20) {
        var bridge = [
            "Still on the " + (t ? t.replace('-',' ') : 'same topic') + " — ",
            "To add to that — ",
            "Worth knowing: "
        ][q2.length % 3];
        var extras = {
            'root-rot':  "the number one sign of recovery is firm white new root growth. Check again in a week after repotting.",
            'overwater': "a moisture meter (cheap, ~$10) takes the guesswork out of when to water.",
            'pests':     "always check the leaf undersides and where the stem meets the soil — pests hide there.",
            'yellowing': "remove the yellow leaves entirely — the plant is wasting energy trying to sustain them.",
            'default':   "if things don't improve in 2 weeks, that's a signal to dig deeper — literally, check the roots."
        };
        return { text: bridge + (extras[t] || extras['default']), actions: ctx.lastCarlActions || [], watch: ctx.lastCarlWatch || '', source: 'follow-up', _topic: t };
    }

    return null;
}

// Detect topic from query for context threading
function offDetectTopic_(q) {
    var TOPIC_MAP = [
        { topic: 'root-rot',     keys: ['root rot','root','rot','mushy','rotten','black root','smells','rotten smell'] },
        { topic: 'overwater',    keys: ['overwater','too much water','waterlogged','soggy','wet soil','drowning'] },
        { topic: 'underwater',   keys: ['underwater','not enough water','dry','drought','bone dry','forgot to water','forgot water'] },
        { topic: 'yellowing',    keys: ['yellow','yellowing','pale','chlorosis','going yellow'] },
        { topic: 'browning',     keys: ['brown','browning','crispy','brown tips','brown edge'] },
        { topic: 'spots',        keys: ['spot','spots','spotting','lesion','mark','marks','patches'] },
        { topic: 'drooping',     keys: ['droop','wilt','limp','floppy','soft','drooping','wilting'] },
        { topic: 'pests',        keys: ['bug','pest','fly','gnat','mite','aphid','scale','mealybug','thrip','insect','spider'] },
        { topic: 'repotting',    keys: ['repot','pot bound','root bound','too small','outgrown'] },
        { topic: 'fertilizing',  keys: ['fertilize','fertilizer','feed','nutrient','deficiency'] },
        { topic: 'light',        keys: ['light','sunlight','sun','dark','shade','bright'] },
        { topic: 'propagation',  keys: ['propagate','cutting','cuttings','clone','babies','new plant'] },
        { topic: 'humidity',     keys: ['humidity','humid','dry air','mist','humidifier'] },
    ];
    var best = null, bestScore = 0;
    TOPIC_MAP.forEach(function(t) {
        var s = offScore_(q, t.keys);
        if (s > bestScore) { bestScore = s; best = t.topic; }
    });
    return bestScore >= 2 ? best : null;
}

// Main offline converse — full pipeline
function carlOfflineConverse(text, plant, chatHistory, kbEnabled) {
    var q = offNorm_(text);
    var genus = (plant && (plant.genus || (plant.gs && plant.gs.split(' ')[0]))) || '';
    var plantName = (plant && plant.nickname) || genus || 'your plant';
    var ctx = offGetContext_(chatHistory);
    var detectedTopic = offDetectTopic_(q);

    // 1. Personality / social (greetings, thanks, frustration)
    var pers = kbPersonality(text, plant, chatHistory);
    if (pers) return { text: pers.text, actions: [], watch: '', source: 'personality', _topic: ctx.topic };

    // 2. Conversational follow-up (uses active topic context)
    if (offIsFollowUp_(q, ctx)) {
        var fu = offFollowUpResponse_(q, ctx, plant, plantName);
        if (fu) return fu;
    }

    // 3. KB match — gated by kbEnabled
    if (kbEnabled !== false) {
        var kbResult = kbDiagnoseLocal(genus, text);
        if (kbResult && kbResult.length > 0 && kbResult[0].score >= 1) {
            var composed = kbCompose(kbResult, genus, text, plant);
            if (composed && composed.explanation) {
                return { text: composed.explanation, actions: composed.immediateActions || [], watch: composed.watchFor || '', source: 'kb', _topic: detectedTopic || ctx.topic };
            }
        }
    }

    // 2.5. ai_hint rows from KB (saved by plantosCarlLearn — actual learned content)
    var hints = (_KB_CACHE && _KB_CACHE.hints) ? _KB_CACHE.hints : [];
    if (hints.length) {
        var bestHint = null, bestHintScore = 0;
        hints.forEach(function(h) {
            if (h.subject && h.subject !== '*' && genus && h.subject !== genus.toLowerCase()) return;
            var s = offScore_(q, h.keywords);
            if (s >= 2 && s > bestHintScore) { bestHintScore = s; bestHint = h; }
        });
        if (bestHint) {
            return { text: bestHint.answer, actions: bestHint.actions || [], watch: bestHint.watch || '', source: 'kb-hint', _topic: detectedTopic || ctx.topic };
        }
    }

    // 3.5. Learned conversation patterns from online sessions
    var convType = offIsFollowUp_(q, ctx)
        ? (offScore_(q, ['how do i fix','how to fix','fix it','what should i do']) >= 2 ? 'follow-fix'
          : offScore_(q, ['how bad','how serious','will it die','is it bad']) >= 2 ? 'follow-severity'
          : offScore_(q, ['tell me more','more info','explain','elaborate']) >= 2 ? 'follow-more'
          : offScore_(q, ['how long','how many days','when will']) >= 2 ? 'follow-time'
          : 'follow-general')
        : (detectedTopic ? 'diagnosis' : 'general');
    var convMatch = carlConvSearch_(q, genus, detectedTopic || ctx.topic || '', convType);
    if (convMatch) return convMatch;

    // 4. kbFollowUp threading — gated by kbEnabled
    var lastKb = null;
    if (kbEnabled !== false) for (var i = (chatHistory||[]).length - 1; i >= 0; i--) {
        if (chatHistory[i].role === 'carl' && chatHistory[i]._kbResult) { lastKb = chatHistory[i]._kbResult; break; }
    }
    if (lastKb) {
        var kfu = kbFollowUp(text, lastKb, plant, chatHistory);
        if (kfu && kfu.explanation) return { text: kfu.explanation, actions: kfu.immediateActions || [], watch: kfu.watchFor || '', source: 'kb', _topic: detectedTopic || ctx.topic };
    }

    // 5. Plant-data facts
    var fact = carlOfflineFact_(q, plant, plantName);
    if (fact) return Object.assign(fact, { _topic: ctx.topic });

    // 6. Topic templates (scored, not first-match)
    var tmpl = carlOfflineTemplate_(q, plantName, genus, plant);
    if (tmpl) return Object.assign(tmpl, { _topic: detectedTopic });

    // 7. Topic-aware clarification question — smarter than "no KB entry"
    return carlOfflineClarify_(q, ctx, plant, plantName, detectedTopic);
}

// Smart clarification — uses context to ask a useful next question
function carlOfflineClarify_(q, ctx, plant, plantName, detectedTopic) {
    // If we have an active topic, ask something topically relevant
    var t = detectedTopic || ctx.topic;
    var clarifyMap = {
        'yellowing':  'Which leaves are yellowing — old lower leaves, new growth, or all over? And is the soil wet or dry right now?',
        'browning':   'Are the brown bits crispy and dry, or soft and mushy? And where on the leaf — tips, edges, or spreading patches?',
        'spots':      'What do the spots look like — are they dry/papery, or wet-looking? Any pattern or colour to them?',
        'drooping':   'Is the soil wet or dry when it droops? That tells us a lot — drooping in dry soil is very different from drooping in wet soil.',
        'root-rot':   'When you look at the roots, are they white and firm, or brown/black and mushy? Any smell?',
        'pests':      'Where are you seeing them — on the leaves, in the soil, flying around? Any webbing or sticky residue?',
        'light':      'How far is ' + plantName + ' from a window, and which direction does it face?',
        'overwater':  'How often are you watering, and does the pot have drainage holes?',
        'underwater': 'When did you last water ' + plantName + ', and how dry is the soil right now?',
    };

    // If prior conversation, bridge to it
    if (ctx.lastCarlText && ctx.turns > 2 && t) {
        return {
            text: "Still not sure what you mean — on the " + t.replace('-',' ') + " front: " + (clarifyMap[t] || 'can you describe what you\'re seeing in more detail?'),
            actions: [], watch: '', source: 'clarify', _topic: t
        };
    }

    if (clarifyMap[t]) {
        return { text: clarifyMap[t], actions: [], watch: '', source: 'clarify', _topic: t };
    }

    // Short/vague input — ask for a specific observable
    if (q.length < 20) {
        var vague = [
            "What's going on with " + plantName + "? Describe what you're seeing — colour, texture, which part of the plant.",
            "Tell me more — what does " + plantName + " look like right now?",
            "What's the symptom? I need something to go on — leaves, stems, soil, roots?",
        ];
        return { text: vague[q.length % vague.length], actions: [], watch: '', source: 'clarify', _topic: null };
    }

    // Novel topic — acknowledge and redirect well
    return {
        text: "I don't have that in my KB for " + plantName + " yet. Could you rephrase — or describe the symptom (colour, which part, when it started)? Alternatively, paste a care guide into Train to teach me about " + (genus || 'this plant') + ".",
        actions: [], watch: '', source: 'miss', _topic: null
    };
}

// Answer questions directly from plant's own data (word-safe matching)
function carlOfflineFact_(q, plant, plantName) {
    if (!plant) return null;
    function hasPhrase(arr) {
        return arr.some(function(w) {
            var re = new RegExp('(?:^|\\s)' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(?:\\s|$|[?!,])');
            return re.test(q) || q === w || q.indexOf(w) === 0 || q.indexOf(' ' + w) !== -1;
        });
    }
    var DUE      = ['due','overdue','next water','when next','water soon','water due','when do i water next'];
    var WATER    = ['last water','last watered','when water','when did i water','did i water','have i watered','when was it watered'];
    var DAYS     = ['how often','how frequently','watering schedule','water every','water interval','every how many'];
    var LOCATION = ['where is it','where is','location','which room','where do you keep','where does'];
    var BIRTHDAY = ['how old','birthday','age of','when was it planted','when did you get','when planted'];
    var SUBSTRATE= ['what soil','what substrate','what medium','what mix','what compost','growing in'];
    var POT      = ['what pot','pot size','what size pot','pot material','what container'];

    if (hasPhrase(DUE) && plant.due)
        return { text: 'Next water due for ' + plantName + ': ' + plant.due + (plant.waterEveryDays ? ' (every ' + plant.waterEveryDays + ' days).' : '.'), actions: [], watch: '', source: 'fact' };
    if (hasPhrase(WATER) && plant.lastWatered)
        return { text: plantName + ' was last watered on ' + plant.lastWatered + '.' + (plant.due ? ' Next due: ' + plant.due + '.' : ''), actions: [], watch: '', source: 'fact' };
    if (hasPhrase(DAYS) && plant.waterEveryDays)
        return { text: plantName + ' is scheduled every ' + plant.waterEveryDays + ' days.', actions: [], watch: '', source: 'fact' };
    if (hasPhrase(LOCATION) && plant.location)
        return { text: plantName + ' is in: ' + plant.location + '.', actions: [], watch: '', source: 'fact' };
    if (hasPhrase(BIRTHDAY) && plant.birthday)
        return { text: plantName + "'s birthday: " + plant.birthday + '.', actions: [], watch: '', source: 'fact' };
    if (hasPhrase(SUBSTRATE) && plant.substrate)
        return { text: plantName + ' is growing in: ' + plant.substrate + '.', actions: [], watch: '', source: 'fact' };
    if (hasPhrase(POT) && plant.potSize)
        return { text: plantName + ' is in a ' + plant.potSize + (plant.potMaterial ? ' ' + plant.potMaterial : '') + ' pot.', actions: [], watch: '', source: 'fact' };
    return null;
}

        { id: 'smell', keys: ['smell','smelly','odor','stink','rotten smell','bad smell','smells bad','smells like rot'], text: 'A bad smell from ' + plantName + ' = **root rot almost certainly**. Rotting roots produce a distinct sour/musty odour. Unpot, cut away all brown/mushy roots with clean scissors, air-dry for an hour, repot in fresh dry mix.', actions: ['Unpot and inspect roots now', 'Cut all mushy or black roots cleanly', 'Repot in fresh dry mix, water sparingly for 2 weeks'], watch: 'Smell persisting after repot = more rot remaining' },
